name: refresh repo cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - gen-cards.js
      - .github/workflows/cards.yml

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: regenerate cards with live star counts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node gen-cards.js

      - name: commit refreshed cards if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain cards/)" ]; then
            git add cards/
            git commit -m "chore: refresh repo cards (live star counts)"
            git push
          else
            echo "cards already up to date"
          fi
